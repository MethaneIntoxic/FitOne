        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(139, 92, 246, 0.05) 100%);

            backdrop-filter: blur(24px);

<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary/30">
<!-- Top Navigation (Shell Invisible for Transactional Flow) -->
<header class="fixed top-0 z-50 w-full flex justify-between items-center px-6 py-4 bg-[#0e0e10]">
<div class="text-xl font-black tracking-tighter text-primary font-headline uppercase">
            NEON PULSE
        </div>
<div class="flex items-center gap-4">
<span class="text-xs font-label uppercase tracking-widest text-on-surface-variant">Step 02/04</span>
</div>
</header>
<main class="relative pt-24 pb-32 px-6 max-w-2xl mx-auto min-h-screen flex flex-col justify-center">
<!-- Header Section -->
<section class="mb-12">
<h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tight mb-4 leading-tight">
                DEFINE YOUR <br/>
<span class="text-primary italic">KINETIC EDGE</span>
</h1>
<p class="text-on-surface-variant font-body text-lg max-w-md">
                Select your primary focus. NEON PULSE will recalibrate its algorithms to your specific physiology.
            </p>
</section>
<!-- Goal Selection Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Weight Loss Card (Active State Simulation) -->
<button class="group relative flex flex-col items-start p-6 rounded-lg bg-surface-container-high ring-1 ring-primary/40 shadow-[0_0_30px_rgba(139,92,246,0.15)] transition-all duration-300 text-left">
<div class="mb-8 p-3 rounded-md bg-primary/10 text-primary">
<span class="material-symbols-outlined" data-icon="monitor_weight">monitor_weight</span>
</div>
<div class="mt-auto">
<h3 class="font-headline text-xl font-bold uppercase tracking-wide mb-1">Weight Loss</h3>
<p class="text-on-surface-variant text-sm font-label">Optimize metabolic efficiency and fat oxidation through high-intensity precision.</p>
</div>
<!-- Selection Glow Indicator -->
<div class="absolute inset-0 rounded-lg bg-gradient-to-tr from-primary/5 to-transparent pointer-events-none"></div>
</button>
<!-- Muscle Gain Card -->
<button class="group relative flex flex-col items-start p-6 rounded-lg bg-surface-container hover:bg-surface-container-high transition-all duration-300 text-left border border-transparent hover:border-outline-variant/20">
<div class="mb-8 p-3 rounded-md bg-surface-container-highest text-on-surface-variant group-hover:text-primary group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
</div>
<div class="mt-auto">
<h3 class="font-headline text-xl font-bold uppercase tracking-wide mb-1">Muscle Gain</h3>
<p class="text-on-surface-variant text-sm font-label">Hypertrophy focus with progressive loading and nutritional synchronization.</p>
</div>
</button>
<!-- Maintenance Card -->
<button class="group relative flex flex-col items-start p-6 rounded-lg bg-surface-container hover:bg-surface-container-high transition-all duration-300 text-left border border-transparent hover:border-outline-variant/20">
<div class="mb-8 p-3 rounded-md bg-surface-container-highest text-on-surface-variant group-hover:text-primary group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" data-icon="rebase_edit">rebase_edit</span>
</div>
<div class="mt-auto">
<h3 class="font-headline text-xl font-bold uppercase tracking-wide mb-1">Maintenance</h3>
<p class="text-on-surface-variant text-sm font-label">Sustain peak physical condition while optimizing daily energy availability.</p>
</div>
</button>
<!-- Performance Card -->
<button class="group relative flex flex-col items-start p-6 rounded-lg bg-surface-container hover:bg-surface-container-high transition-all duration-300 text-left border border-transparent hover:border-outline-variant/20">
<div class="mb-8 p-3 rounded-md bg-surface-container-highest text-on-surface-variant group-hover:text-primary group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" data-icon="speed">speed</span>
</div>
<div class="mt-auto">
<h3 class="font-headline text-xl font-bold uppercase tracking-wide mb-1">Performance</h3>
<p class="text-on-surface-variant text-sm font-label">Maximized output for competitive athletes. Power, speed, and reaction focus.</p>
</div>
</button>
</div>
<!-- Background Ambient Element -->
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full glass-panel z-50 py-8 px-6">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-6">
<button class="text-on-surface-variant font-label uppercase tracking-widest text-sm hover:text-on-surface transition-colors">
                Back
            </button>
<button class="flex-1 max-w-[280px] bg-primary text-on-primary font-headline font-bold py-4 rounded-lg shadow-[0_10px_30px_rgba(139,92,246,0.3)] hover:bg-primary-dim transition-all duration-300 active:scale-[0.98] uppercase tracking-widest">
                CONTINUE
