<body class="bg-background text-on-background font-body min-h-screen flex flex-col monolith-bg">
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 max-w-4xl mx-auto w-full">
<!-- Header Section: Intentional Asymmetry -->
<header class="w-full mb-16 self-start md:pl-8">
<h1 class="text-4xl md:text-6xl font-headline font-bold tracking-tighter text-on-surface-variant mb-4 uppercase">
                DEFINE YOUR<br/>
<span class="text-white">KINETIC EDGE</span>
</h1>
<p class="text-primary tracking-[0.2em] uppercase text-sm font-medium">
                Select your primary focus
            </p>
</header>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
<!-- Card: Weight Loss -->
<button class="group relative flex flex-col items-start p-8 rounded-DEFAULT bg-surface-container-low border border-outline-variant/15 text-left transition-all duration-300 hover:bg-surface-container hover:scale-[1.02]">
<div class="mb-6 p-3 rounded-xl bg-surface-container-high group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="monitor_weight">monitor_weight</span>
</div>
<h3 class="text-xl font-bold text-white mb-2 uppercase tracking-tight">Weight Loss</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Optimize metabolic output and shred excess body mass with precision.</p>
</button>
<!-- Card: Muscle Gain (Selected) -->
<button class="group relative flex flex-col items-start p-8 rounded-DEFAULT bg-surface-container border-2 border-primary kinetic-glow text-left transition-all duration-300 scale-[1.03]">
<div class="absolute top-4 right-4">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="mb-6 p-3 rounded-xl bg-primary/20">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<h3 class="text-xl font-bold text-white mb-2 uppercase tracking-tight">Muscle Gain</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Hypertrophy-focused training to maximize structural density and power.</p>
</button>
<!-- Card: Maintenance -->
<button class="group relative flex flex-col items-start p-8 rounded-DEFAULT bg-surface-container-low border border-outline-variant/15 text-left transition-all duration-300 hover:bg-surface-container hover:scale-[1.02]">
<div class="mb-6 p-3 rounded-xl bg-surface-container-high group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="balance">balance</span>
</div>
<h3 class="text-xl font-bold text-white mb-2 uppercase tracking-tight">Maintenance</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Sustain current biomechanical state while refining movement quality.</p>
</button>
<!-- Card: Performance -->
<button class="group relative flex flex-col items-start p-8 rounded-DEFAULT bg-surface-container-low border border-outline-variant/15 text-left transition-all duration-300 hover:bg-surface-container hover:scale-[1.02]">
<div class="mb-6 p-3 rounded-xl bg-surface-container-high group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="bolt">bolt</span>
</div>
<h3 class="text-xl font-bold text-white mb-2 uppercase tracking-tight">Performance</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Enhance explosive energy, agility, and cognitive-motor synchronization.</p>
</button>
</div>

<footer class="mt-20 w-full flex flex-col items-center gap-8">
<button class="w-full max-w-sm py-5 rounded-DEFAULT bg-gradient-to-br from-primary-dim to-primary text-on-primary-container font-bold text-lg uppercase tracking-widest transition-transform active:scale-95 shadow-[0_0_30px_-5px_rgba(139,92,246,0.5)]">
                CONTINUE
            </button>
<button class="text-on-surface-variant font-medium text-sm tracking-widest uppercase hover:text-white transition-colors">
                Back
            </button>
</footer>
</main>

<div class="fixed top-1/2 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
