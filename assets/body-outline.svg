<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 520" role="img" aria-label="Body silhouette front and back">
  <defs>
    <style>
      .outline { fill: #121a2b; stroke: #2b3753; stroke-width: 2; }
      .split { stroke: #2a3550; stroke-width: 2; stroke-dasharray: 4 6; }
    </style>
  </defs>

  <line class="split" x1="180" y1="20" x2="180" y2="500" />

  <g transform="translate(58,20)">
    <circle class="outline" cx="58" cy="34" r="22" />
    <rect class="outline" x="40" y="58" width="36" height="70" rx="16" />
    <rect class="outline" x="20" y="76" width="18" height="72" rx="9" />
    <rect class="outline" x="78" y="76" width="18" height="72" rx="9" />
