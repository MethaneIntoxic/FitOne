    <rect class="outline" x="60" y="126" width="16" height="24" rx="7" />
    <rect class="outline" x="42" y="150" width="14" height="104" rx="7" />
    <rect class="outline" x="60" y="150" width="14" height="104" rx="7" />
    <rect class="outline" x="40" y="252" width="14" height="92" rx="7" />
    <rect class="outline" x="62" y="252" width="14" height="92" rx="7" />
    <text x="58" y="380" fill="#7f8baa" font-family="Space Grotesk, sans-serif" font-size="12" text-anchor="middle">FRONT</text>
